name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # ou 'master', dependendo de qual for a sua branch principal

# Permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Mesma versão compatível com seu package.json
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Se for página principal (SEM pathPrefix), use apenas: run: npm run build
      # Se for página de projeto (COM pathPrefix configurado no passo 1), use: run: npx gatsby build --prefix-paths
      - name: Build with Gatsby
        run: npx gatsby build --prefix-paths 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
